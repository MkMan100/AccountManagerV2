<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale - Account Manager</title>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
    <style>
        body { padding: 2rem; background: #f7f8f9; }
        .container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container grid-sm">
    <header class="mb-2">
        <h2 class="text-success">Register a Sale</h2>
        <p class="text-gray">Insert the details of the product you are selling.</p>
    </header>

    <form action="/sale" method="POST">
        <!-- Nome Prodotto -->
        <div class="form-group">
            <label class="form-label" for="product_name">Product Name</label>
            <input class="form-input" type="text" id="product_name" name="product" placeholder="e.g. Oranges" required>
        </div>

        <div class="columns">
            <!-- Prezzo Unitario -->
            <div class="column col-6 col-xs-12">
                <div class="form-group">
                    <label class="form-label" for="price">Selling Price (€)</label>
                    <input class="form-input" type="number" step="0.01" id="price" name="price" placeholder="0.00" required>
                </div>
            </div>
            <!-- Quantità -->
            <div class="column col-6 col-xs-12">
                <div class="form-group">
                    <label class="form-label" for="quantity">Number of Pieces</label>
                    <input class="form-input" type="number" id="quantity" name="quantity" placeholder="0" required>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="form-group mt-1">
            <button class="btn btn-success btn-block" type="submit">
                Confirm Sale
            </button>
        </div>
		<div class="form-group mt-1">
	     <a href="index.html" class="btn btn-link px-0"><i class="icon icon-back"></i> Back to Dashboard</a>
	    </div>
    </form>
</div>

</body>
</html>
