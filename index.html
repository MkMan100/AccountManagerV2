<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting System - Dashboard</title>
    <!-- Caricamento Spectre.css via CDN -->
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-exp.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container grid-lg">
    
    <!-- Header / Hero Section -->
    <div class="hero text-center">
        <h1 class="text-primary">Warehouse Manager v2</h1>
        <p class="text-gray">Sistema di gestione contabilità e scorte</p>
    </div>

    <!-- Sezione Dati Principali -->
    <div class="columns">
        <!-- Saldo Attuale -->
        <div class="column col-6 col-sm-12">
            <div class="card shadow">
                <div class="card-header">
                    <div class="card-subtitle text-gray">Current Balance</div>
                </div>
                <div class="card-body">
                    <h2 class="text-dark">€ 1.250,50</h2>
                </div>
            </div>
        </div>

        <!-- Totale Prodotti -->
        <div class="column col-6 col-sm-12">
            <div class="card shadow">
                <div class="card-header">
                    <div class="card-subtitle text-gray">Stock Level</div>
                </div>
                <div class="card-body">
                    <h2 class="text-dark">142 <small class="text-gray" style="font-size: 0.5em;">unità</small></h2>
                </div>
            </div>
        </div>
    </div>

    <hr class="my-2">

    <!-- Azioni Rapide (Bottoni) -->
    <div class="columns mt-2">
        <div class="column col-12">
            <h4 class="mb-2">Quick Actions</h4>
            <div class="btn-group btn-group-block">
                <a href="purchase.html" class="btn btn-lg btn-primary">
                    <i class="icon icon-plus"></i> Buy Product
                </a>
                <a href="sale.html" class="btn btn-lg btn-success">
                    <i class="icon icon-share"></i> Sell Product
                </a>
                <a href="balance.html" class="btn btn-lg btn-warning">
                    <i class="icon icon-edit"></i> Change Balance
                </a>
                <a href="history.html" class="btn btn-lg">
                    <i class="icon icon-menu"></i> View History
                </a>
            </div>
        </div>
    </div>

    <!-- Anteprima Magazzino -->
    <div class="columns mt-2">
        <div class="column col-12">
            <div class="card">
                <div class="card-header">
                    <div class="card-title h5">Inventory Preview</div>
                </div>
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Quantity</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Questi verranno popolati da Flask -->
                            <tr>
                                <td>Apples</td>
                                <td>€ 1.50</td>
                                <td>45</td>
                            </tr>
                            <tr>
                                <td>Oranges</td>
                                <td>€ 2.00</td>
                                <td>12</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer">
                    <a href="/warehouse" class="btn btn-link">Full Warehouse List</a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
