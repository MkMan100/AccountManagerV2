<!doctype html>
<html>
<head>
	<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-exp.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
	<link rel="stylesheet" href="style.css">
<meta charset="utf-8">
<title>History</title>
</head>

<body>
	<div class="container grid-lg">
  <h3>Operation History</h3>
  
  <div class="mb-2">
    <span class="label label-rounded">Displaying range: 0 to 50</span>
  </div>
<div class="columns mb-2">
  <div class="column col-3">
    <input class="form-input" type="number" name="from" placeholder="From line...">
  </div>
  <div class="column col-3">
    <input class="form-input" type="number" name="to" placeholder="To line...">
  </div>
  <div class="column col-2">
    <button class="btn btn-primary">Filter</button>
  </div>
</div>
  <table class="table table-striped table-hover">
    <thead>
      <tr>
        <th>#</th>
        <th>Operation</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td><span class="label label-success">Sale</span></td>
        <td>Sold 5x Apples at €1.50</td>
      </tr>
      <tr>
        <td>2</td>
        <td><span class="label label-primary">Purchase</span></td>
        <td>Bought 10x Oranges at €0.80</td>
      </tr>
    </tbody>
  </table>
  
  <div class="form-footer mt-2">
      <a href="index.html" class="btn btn-link px-0"><i class="icon icon-back"></i> Back to Dashboard</a>
    </div>
</div>
</body>
</html>
